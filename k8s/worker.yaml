---
# Worker Deployment — horizontally scalable
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ai-platform
  labels:
    app: worker
    app.kubernetes.io/part-of: ai-task-platform
spec:
  replicas: 2    # scale up for higher throughput; each pod pulls independently
  selector:
    matchLabels:
      app: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      terminationGracePeriodSeconds: 30   # allow current job to finish
      containers:
        - name: worker
          image: DOCKER_USERNAME/ai-task-worker:latest   # replaced by CI/CD
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: ai-platform-config
            - secretRef:
                name: ai-platform-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import os, redis, pymongo; redis.from_url(os.getenv('REDIS_URL', 'redis://redis-service:6379')).ping(); pymongo.MongoClient(os.getenv('MONGO_URI', 'mongodb://mongo-service:27017/ai-task-platform'), serverSelectionTimeoutMS=3000).admin.command('ping'); print('ok')"
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import os, redis, pymongo; redis.from_url(os.getenv('REDIS_URL')).ping(); pymongo.MongoClient(os.getenv('MONGO_URI'), serverSelectionTimeoutMS=3000).admin.command('ping')"
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
---
# Worker HorizontalPodAutoscaler
# Scales based on CPU; for queue-depth scaling, use KEDA (see ARCHITECTURE.md)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
  namespace: ai-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 180
