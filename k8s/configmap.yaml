apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-platform-config
  namespace: ai-platform
  labels:
    app.kubernetes.io/part-of: ai-task-platform
data:
  # Backend
  NODE_ENV: "production"
  PORT: "5000"
  JWT_EXPIRES_IN: "7d"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "100"
  TRUST_PROXY: "true"
  FRONTEND_URLS: "http://ai-platform.local"

  # Shared non-sensitive queue config
  REDIS_QUEUE_NAME: "ai-tasks"

  # Worker
  REDIS_BLOCK_TIMEOUT: "5"
  MAX_RETRIES: "3"
