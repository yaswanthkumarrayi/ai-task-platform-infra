---
# Restrict MongoDB/Redis ingress to backend and worker only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: data-services-ingress-policy
  namespace: ai-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["mongo", "redis"]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["backend", "worker"]
      ports:
        - protocol: TCP
          port: 27017
        - protocol: TCP
          port: 6379
---
# Limit backend/worker egress to MongoDB, Redis, and DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app-egress-policy
  namespace: ai-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["backend", "worker"]
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mongo
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
